  <text x="570" y="174" fill="#64748b" font-size="10">   session.get(url, timeout=30)  — positional removed</text>

  <text x="516" y="196" fill="#6ee7b7" font-size="11" font-weight="600">Step 3.</text>
  <text x="570" y="196" fill="#94a3b8" font-size="11">Audit PreparedRequest.prepare_url call sites</text>
  <text x="570" y="212" fill="#64748b" font-size="10">   Ensure all URLs include scheme (http:// or https://)</text>

  <text x="516" y="234" fill="#fbbf24" font-size="11" font-weight="600">Step 4.</text>
  <text x="570" y="234" fill="#94a3b8" font-size="11">Run test suite — verify no InvalidURL exceptions</text>

  <text x="516" y="256" fill="#94a3b8" font-size="11" font-weight="600">Step 5.</text>
  <text x="570" y="256" fill="#94a3b8" font-size="11">Pin to 3.2.1 and tag rollback checkpoint</text>

