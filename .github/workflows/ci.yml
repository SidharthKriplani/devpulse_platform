name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run unit tests
        run: PYTHONPATH=. pytest tests/test_query_mode.py -v
      - name: Validate evidence artifacts
        run: python scripts/validate_streaming_prd_v1.py
      - name: Run PRD validation suite
        run: python scripts/run_prd_core_validation_suite_v1.py
